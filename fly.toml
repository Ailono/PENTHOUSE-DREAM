app = "penthouse-dream"
primary_region = "ams"

[build]
  dockerfile = "docker/Dockerfile.backend"

[env]
  DB_TYPE = "sqlite"

[experimental]
  auto_rollback = true

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [services.concurrency]
    hard_limit = 50
    soft_limit = 30
    type = "requests"

  [[services.ports]]
    port = 8000
    handlers = ["http"]
